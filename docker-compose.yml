version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: kanban-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: kanban
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 8L4h1APH
    networks:
      - kanban-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kanban-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/kanban
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - kanban-network

volumes:
  mongodb_data:
    driver: local

networks:
  kanban-network:
    driver: bridge
